services:
  - type: web
    name: waypoint-rit
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_USER
        value: 36By4Fv9oDvu23Z.root
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        value: waypoint_rit
      - key: DB_PORT
        value: 4000
